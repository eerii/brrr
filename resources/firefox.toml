[firefox]
build_dir = "obj"
container_packages = ["git", "make", "python3", "sccache", "libasound2"]
env = ["CC=clang", "CXX=clang++", "SCCACHE_SERVER_PORT=4201"]
remote = "git@github.com:mozilla-firefox/firefox.git"

[firefox.commands]
bootstrap = "./mach bootstrap"
build = "./mach build"
run = "./mach run"
test = "./mach wpt"
